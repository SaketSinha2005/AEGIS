apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-backend
  namespace: aegis-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aegis-backend
  template:
    metadata:
      labels:
        app: aegis-backend
    spec:
      containers:
        - name: aegis-backend-container
          image: aegis-backend
          imagePullPolicy: Never

          envFrom: 
            - secretRef: 
              name: backend-secret 

          ports:
            - containerPort: 8000

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

